
# Colors

gray_light="#D8DEE9"
gray_dark="#3B4252"
green_soft="#A3BE8C"
blue_muted="#81A1C1"
cyan_soft="#88C0D0"

# Terminal

set -g default-terminal "xterm-256color"

# Status bar

set -g status-position bottom
set -g status-left-length 100
set -g status-style "fg=${gray_light},bg=default"

# Session name on left

set -g status-left "#[fg=${green_soft},bold]#S #[fg=${gray_light}]| "

# Window list

set -g window-status-format " #I:#W "
set -g window-status-current-format "#[fg=${cyan_soft},bold]#I:#W"

# Messages and copy mode

set -g message-style "fg=${gray_light},bg=default"
set -g mode-style "fg=${gray_dark},bg=${blue_muted}"

# Dim inactive panes

set -g window-style "fg=colour245,bg=colour236"
set -g window-active-style "fg=default,bg=default"

# Pane borders

set -g pane-border-style "fg=colour238,bg=colour236"
set -g pane-active-border-style "fg=green,bg=colour236"

set -g mouse on
